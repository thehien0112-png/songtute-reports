const STORAGE_KEY = 'fb_video_review_' + SYNC.period;

let state = {};  // { videoId: 'approved' | 'rejected' | 'pending' }
let curFilter = 'all';

function fmtDur(s){
  if(!s) return '?';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m>59 ? `${Math.floor(m/60)}h${m%60}m` : `${m}:${sec.toString().padStart(2,'0')}`;
}
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadState(){
  try{
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) state = JSON.parse(stored);
  }catch(e){}
}
function saveLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function statsCount(){
  let ok=0, no=0, pd=0;
  DATA.forEach(v=>{
    const s = state[v.id] || 'pending';
    if(s==='approved') ok++;
    else if(s==='rejected') no++;
    else pd++;
  });
  document.getElementById('stTotal').textContent = DATA.length;
  document.getElementById('stOk').textContent = ok;
  document.getElementById('stNo').textContent = no;
  document.getElementById('stPd').textContent = pd;
  return {ok,no,pd};
}

function render(){
  const g = document.getElementById('grid');
  const filtered = DATA.filter(v=>{
    const s = state[v.id] || 'pending';
    if(curFilter==='all') return true;
    if(curFilter==='long') return v.duration > 300;
    if(curFilter==='short') return v.duration <= 300;
    return s === curFilter;
  });
  if(!filtered.length){
    g.innerHTML = '<div class="empty">Không có video nào.</div>';
    return;
  }

  // Compute schedule for approved videos in original order
  const apOrder = DATA.filter(v=>(state[v.id]||'pending')==='approved').map(v=>v.id);
  const slotMap = {};
  apOrder.forEach((id,i)=>{ slotMap[id] = computeSlot(i); });

  g.innerHTML = filtered.map(v=>{
    const s = state[v.id] || 'pending';
    const cls = s==='approved'?'approved':s==='rejected'?'rejected':'';
    const schd = slotMap[v.id] || '';
    return `
    <div class="card ${cls}" data-id="${v.id}">
      <a class="thumb" href="${v.url}" target="_blank" rel="noopener"
         style="background-image:url('${v.thumbnail||''}')">
        <span class="src">${v.source}</span>
        <span class="dur">${fmtDur(v.duration)}</span>
        <span class="play">▶</span>
      </a>
      <div class="body">
        <div class="ttl">${escapeHtml(v.title || 'Video')}</div>
        <div class="desc">${escapeHtml(v.description || '(không có mô tả)')}</div>
        <div class="meta">
          ${v.upload_date ? `📅 ${v.upload_date.slice(0,4)}-${v.upload_date.slice(4,6)}-${v.upload_date.slice(6,8)} · ` : ''}
          ${v.view_count ? `👁 ${v.view_count.toLocaleString()} views` : ''}
        </div>
        ${schd ? `<div class="schd">📤 Lên lịch: ${schd}</div>` : ''}
      </div>
      <div class="actions">
        <button class="act-app ${s==='approved'?'on':''}" onclick="setStatus('${v.id}','approved')">✅ Duyệt</button>
        <button class="act-rej ${s==='rejected'?'on':''}" onclick="setStatus('${v.id}','rejected')">❌ Bỏ</button>
      </div>
    </div>`;
  }).join('');
}

// Schedule: T3 + T7 lúc 12:00, bắt đầu 2026-05-02
function computeSlot(idx){
  const start = new Date('2026-05-02T12:00:00+07:00');
  // Days between slots: Sat→Tue=3, Tue→Sat=4 (alternating)
  let d = new Date(start);
  for(let i=0;i<idx;i++){
    d.setDate(d.getDate() + (i%2===0 ? 3 : 4));
  }
  const dow = ['CN','T2','T3','T4','T5','T6','T7'][d.getDay()];
  return `${dow} ${d.getDate()}/${d.getMonth()+1} 12:00`;
}

function setStatus(id, s){
  const cur = state[id] || 'pending';
  state[id] = (cur === s) ? 'pending' : s;  // toggle
  saveLocal();
  statsCount();
  render();
}

function filt(f, btn){
  curFilter = f;
  document.querySelectorAll('.filt button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

async function syncNow(){
  if(!SYNC.enabled){
    showToast('Sync chưa được setup');
    return;
  }
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  document.getElementById('syncStatus').textContent = 'Đang sync...';
  try{
    const c = statsCount();
    const apList = DATA.filter(v=>(state[v.id]||'pending')==='approved')
      .map((v,i)=>({
        id: v.id, title: v.title, duration: v.duration, url: v.url,
        thumbnail: v.thumbnail, description: v.description,
        scheduled: computeSlotISO(i),
      }));
    const body = `## Trạng thái duyệt video — ${SYNC.period}

**Cập nhật:** ${new Date().toLocaleString('vi-VN')}
**Tổng:** ${c.ok+c.no+c.pd} | ✅ Duyệt: ${c.ok} | ❌ Bỏ: ${c.no} | ⏳ Chờ: ${c.pd}

\`\`\`json
${JSON.stringify({
  last_updated: new Date().toISOString(),
  period: SYNC.period,
  summary: {total: DATA.length, approved: c.ok, rejected: c.no, pending: c.pd},
  decisions: state,
  approved_schedule: apList,
}, null, 2)}
\`\`\`

🔗 **Dashboard:** https://${SYNC.repo.split('/')[0]}.github.io/${SYNC.repo.split('/')[1]}/${location.pathname.split('/').pop()}`;

    const r = await fetch(`https://api.github.com/repos/${SYNC.repo}/issues/${SYNC.issue}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${SYNC.token}`,
        'Accept': 'application/vnd.github+json',
      },
      body: JSON.stringify({body}),
    });
    if(!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0,200)}`);
    document.getElementById('syncStatus').textContent = '✓ Synced ' + new Date().toLocaleTimeString('vi-VN');
    showToast(`Đã sync ✓ (${c.ok} duyệt)`);
  }catch(e){
    document.getElementById('syncStatus').textContent = '✗ Lỗi';
    showToast('Lỗi: ' + e.message);
  }finally{
    btn.disabled = false;
  }
}

function computeSlotISO(idx){
  const start = new Date('2026-05-02T05:00:00Z');  // 12:00 ICT = 05:00 UTC
  let d = new Date(start);
  for(let i=0;i<idx;i++){
    d.setUTCDate(d.getUTCDate() + (i%2===0 ? 3 : 4));
  }
  return d.toISOString().replace(/\.\d{3}Z$/,'Z');
}

async function pullState(){
  if(!SYNC.enabled) return;
  try{
    document.getElementById('syncStatus').textContent = 'Đang tải...';
    const r = await fetch(`https://api.github.com/repos/${SYNC.repo}/issues/${SYNC.issue}`, {
      headers: {
        'Authorization': `Bearer ${SYNC.token}`,
        'Accept': 'application/vnd.github+json',
      },
    });
    if(!r.ok){
      document.getElementById('syncStatus').textContent = '— (chưa sync)';
      return;
    }
    const data = await r.json();
    const m = data.body && data.body.match(/```json\n([\s\S]*?)\n```/);
    if(m){
      const remoteState = JSON.parse(m[1]);
      if(remoteState.decisions){
        state = remoteState.decisions;
        saveLocal();
        document.getElementById('syncStatus').textContent = 'Tải từ GitHub ✓';
      }
    }
  }catch(e){
    document.getElementById('syncStatus').textContent = '— (offline)';
  }
}

(async function init(){
  loadState();
  await pullState();
  statsCount();
  render();
})();
</script>
</body>
